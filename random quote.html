<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteHub | Random Quote Submitter</title>
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary-color: #6b46c1;
            --primary-hover: #553c9a;
            --accent-color: #ed64a6;
            --border-radius: 12px;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            color: var(--text-main);
        }

        /* --- MAIN CONTAINER --- */
        .app-container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* --- CARD STYLING --- */
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        /* Decorative top bar for visual appeal */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* --- QUOTE DISPLAY SECTION --- */
        .quote-box {
            text-align: center;
            padding: 1rem 0;
        }

        .quote-text {
            font-size: 1.6rem;
            font-style: italic;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .quote-text::before {
            content: "“";
            font-size: 3rem;
            color: var(--accent-color);
            line-height: 0;
            vertical-align: bottom;
            margin-right: 0.5rem;
        }

        .quote-text::after {
            content: "”";
            font-size: 3rem;
            color: var(--accent-color);
            line-height: 0;
            vertical-align: top;
            margin-left: 0.2rem;
        }

        .quote-author {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        /* --- FORM SECTION --- */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(107, 70, 193, 0.15);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        /* --- BUTTONS --- */
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0.85rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #edf2f7;
            color: var(--text-main);
            margin-top: 0.5rem;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }
            .quote-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="card">
            <div class="quote-box">
                <p class="quote-text">The only way to do great work is to love what you do.</p>
                <p class="quote-author">— Steve Jobs</p>
                <button class="btn btn-primary" id="next-btn">Next Quote</button>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">Submit a New Quote</h2>
            <form id="quote-form" onsubmit="event.preventDefault();">
                
                <div class="form-group">
                    <label for="input-quote">Quote Text</label>
                    <textarea id="input-quote" class="form-control" placeholder="Type or paste the quote here..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="input-author">Author / Source</label>
                    <input type="text" id="input-author" class="form-control" placeholder="e.g. Albert Einstein, Anonymous" required>
                </div>

                <button type="submit" class="btn btn-primary">Submit Quote</button>
            </form>
        </div>

    </div>

</body>
</html>
